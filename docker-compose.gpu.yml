services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sift_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  query_engine:
    image: meledo/sift-video-query-engine:latest
    build:
      context: ./services/query_engine
      dockerfile: Dockerfile
    container_name: sift_query_engine
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - QDRANT_URL=http://qdrant:6334
      - OUTPUT_DIR=/output
    volumes:
      - ./output:/output
      - ./videos:/videos
      - huggingface_cache:/root/.cache/huggingface
      - ./ui:/app/static
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ingestion:
    image: meledo/sift-video-ingestion:latest-gpu
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
      args:
        USE_CUDA: "1"
        BUILDER_BASE: nvidia/cuda:13.2.0-devel-ubuntu24.04
        RUNTIME_BASE: nvidia/cuda:13.2.0-runtime-ubuntu24.04
    container_name: sift_ingestion
    restart: always
    volumes:
      - ./videos:/videos
      - ./output:/output
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  embedding:
    image: meledo/sift-video-embedding:latest-gpu
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
      args:
        USE_CUDA: "1"
        BUILDER_BASE: nvidia/cuda:13.2.0-devel-ubuntu24.04
        RUNTIME_BASE: nvidia/cuda:13.2.0-cudnn-runtime-ubuntu24.04
    container_name: sift_embedding
    restart: always
    volumes:
      - ./output:/output
    depends_on:
      ingestion:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  huggingface_cache:
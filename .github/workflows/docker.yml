name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
      - 'ui/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push query engine
        uses: docker/build-push-action@v6
        with:
          context: ./services/query_engine
          file: ./services/query_engine/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-query-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ingestion CPU
      - name: Build and push ingestion (CPU)
        uses: docker/build-push-action@v6
        with:
          context: ./services/ingestion
          file: ./services/ingestion/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-ingestion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Ingestion GPU
      - name: Build and push ingestion (GPU)
        uses: docker/build-push-action@v6
        with:
          context: ./services/ingestion
          file: ./services/ingestion/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-ingestion:latest-gpu
          build-args: |
            USE_CUDA=1
            BUILDER_BASE=nvidia/cuda:13.1-runtime-ubuntu22.04
            RUNTIME_BASE=nvidia/cuda:13.1-runtime-ubuntu22.04
          cache-from: type==gha
          cache-to: type=gha,mode=max

      # Embedding CPU
      - name: Build and push embedding (CPU)
        uses: docker/build-push-action@v6
        with:
          context: ./services/embedding
          file: ./services/embedding/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-embedding:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Embedding GPU
      - name: Build and push embedding (GPU)
        uses: docker/build-push-action@v6
        with:
          context: ./services/embedding
          file: ./services/embedding/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-embedding:latest-gpu
          build-args: |
            USE_CUDA=1
            RUNTIME_BASE=nvidia/cuda:13.1-runtime-ubuntu22.04
          cache-from: type=gha
          cache-to: type=gha,mode=max
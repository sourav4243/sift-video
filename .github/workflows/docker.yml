name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'docker-compose.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push query engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/query_engine
          dockerfile: ./services/query_engine/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-query-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ingestion
        uses: docker/build-push-action@v5
        with:
          context: ./services/ingestion
          dockerfile: ./services/ingestion/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-ingestion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push embedding
        uses: docker/build-push-action@v5
        with:
          context: ./services/embedding
          dockerfile: ./services/embedding/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-embedding:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
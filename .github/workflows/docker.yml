name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'
      - 'ui/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: query_engine
            image: sift-video-query-engine
            tag: latest
            scope: query-engine

          - service: ingestion
            image: sift-video-ingestion
            tag: latest
            scope: cpp-services-cpu

          - service: ingestion
            image: sift-video-ingestion
            tag: latest-gpu
            scope: ingestion-gpu
            build-args: |
              USE_CUDA=1
              BUILDER_BASE=nvidia/cuda:13.2.0-devel-ubuntu24.04
              RUNTIME_BASE=nvidia/cuda:13.2.0-runtime-ubuntu24.04

          - service: embedding
            image: sift-video-embedding
            tag: latest
            scope: cpp-services-cpu

          - service: embedding
            image: sift-video-embedding
            tag: latest-gpu
            scope: embedding-gpu
            build-args: |
              USE_CUDA=1
              BUILDER_BASE=nvidia/cuda:13.2.0-devel-ubuntu24.04
              RUNTIME_BASE=nvidia/cuda:13.2.0-cudnn-runtime-ubuntu24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            query_engine:
              - 'services/query_engine/**'
            ingestion:
              - 'services/ingestion/**'
            embedding:
              - 'services/embedding/**'

      - name: Login to Docker Hub
        if: steps.changes.outputs[matrix.service] == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs[matrix.service] == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Extract git metadata
        if: steps.changes.outputs[matrix.service] == 'true'
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Delete old caches for this scope
        if: steps.changes.utputs[matrix.service] == 'true'
        env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --repo ${{ github.repository }} --key ${{ matrix.scope }} \
            --json id -q '.[].id' | xargs -I{} gh cache delete {} --repo ${{ github.repository }} || true

      - name: Build and push ${{ matrix.image }}:${{ matrix.tag }}
        if: steps.changes.outputs[matrix.service] == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ matrix.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ matrix.tag }}-${{ steps.meta.outputs.sha_short }}
          build-args: ${{ matrix.build-args }}
          # no gha cache for gpu builds as cuda layers are too large
          cache-from: ${{ contains(matrix.tag, 'gpu') && '' || format('type=gha,scope={0}', matrix.scope) }}
          cache-to: ${{ contains(matrix.tag, 'gpu') && 'type=inline' || format('type=gha,mode=min,scope={0}', matrix.scope) }}

  verify:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify GPU images
        run: |
          echo "=== Verifying ingestion GPU ==="
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-ingestion:latest-gpu \
            sh -c "ls /usr/local/cuda/lib64/libcudart* && echo 'CUDA runtime OK'"

          echo "=== Verifying whisper CUDA linkage ==="
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-ingestion:latest-gpu \
            sh -c "ldd ./external/whisper/build/bin/whisper-cli | grep -i cuda \
              && echo 'whisper linked against CUDA' \
              || echo 'WARNING: whisper not linked against CUDA'"

          echo "=== Verifying embedding GPU ==="
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-embedding:latest-gpu \
            sh -c "ls /usr/local/cuda/lib64/libcudart* \
              && ls /onnxruntime/lib/libonnxruntime* \
              && echo 'ONNX + CUDA OK'"

          echo "=== Verifying ONNX CUDA EP ==="
          docker run --rm \
            ${{ secrets.DOCKERHUB_USERNAME }}/sift-video-embedding:latest-gpu \
            sh -c "grep -a 'CUDAExecutionProvider' ./embed \
              && echo 'CUDA EP present' \
              || echo 'WARNING: CUDA EP not found'"
services:
  # vector db
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sift_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  # query engine
  query_engine:
    build:
      context: ./services/query_engine
      dockerfile: Dockerfile
    container_name: sift_query_engine
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - QDRANT_URL=http://qdrant:6334
      - OUTPUT_DIR=/output
    volumes:
      - ./output:/output
      - ./services/query_engine/models:/app/models
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
  
  # ingestion service
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: sift_ingestion
    volumes:
      - ./videos:/videos
      - ./output:/output
    depends_on:
      - qdrant
  
  # embedding service (NEW)
  embedding:
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
    container_name: sift_embedding
    volumes:
      - ./output:/output
      - ./services/embedding/models:/app/models
    depends_on:
      - ingestion

volumes:
  huggingface_cache: